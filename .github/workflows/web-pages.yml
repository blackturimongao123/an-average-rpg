name: Deploy An Average RPG to GitHub Pages

# Unified deploy: GitHub Pages (web) + Firebase (rules, indexes, functions) in one run.
# Repo Pages setting (one-time):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Site URL: https://<user>.github.io/an-average-rpg/

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FIREBASE_PROJECT: an-average-rpg

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_ALLOW_REGISTRATION: ${{ secrets.VITE_ALLOW_REGISTRATION }}
      VITE_ALLOWED_USERNAMES: ${{ secrets.VITE_ALLOWED_USERNAMES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Firebase secrets are set
        run: |
          missing=0
          for name in \
            VITE_FIREBASE_API_KEY \
            VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID \
            VITE_FIREBASE_STORAGE_BUCKET \
            VITE_FIREBASE_MESSAGING_SENDER_ID \
            VITE_FIREBASE_APP_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::Repository secret $name is empty or not configured."
              missing=1
            else
              echo "$name is set"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Add the missing values under Settings → Secrets and variables → Actions → Repository secrets,"
            echo "then re-run this workflow."
            exit 1
          fi

      - name: Build web app
        run: pnpm --filter web build

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep APP_VERSION apps/web/src/constants/version.ts | sed 's/.*"\(.*\)".*/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying MVP v$VERSION"

      - name: Validate build output
        run: |
          test -f apps/web/dist/index.html
          test -d apps/web/dist/assets
          grep -q "app-version\" content=\"${{ steps.version.outputs.value }}\"" apps/web/dist/index.html
          touch apps/web/dist/.nojekyll
          echo "Dist size:"
          du -sh apps/web/dist
          find apps/web/dist -type f | wc -l

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy-firebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify FIREBASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "::error title=Missing GitHub secret::FIREBASE_TOKEN is empty or not configured."
            echo "Run: firebase login:ci"
            echo "Add the token under Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi
          echo "FIREBASE_TOKEN is set"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bloodline/shared build

      - name: Build functions
        run: pnpm --filter functions build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project ${{ env.FIREBASE_PROJECT }} --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Storage Rules
        continue-on-error: true
        run: |
          firebase deploy --only storage:rules --project ${{ env.FIREBASE_PROJECT }} --token "${{ secrets.FIREBASE_TOKEN }}" \
            || echo "::warning::Storage rules not deployed. Enable Storage once at https://console.firebase.google.com/project/an-average-rpg/storage (Get Started), then re-run this workflow."

      - name: Deploy Firestore Indexes
        run: firebase deploy --only firestore:indexes --project ${{ env.FIREBASE_PROJECT }} --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Functions
        run: firebase deploy --only functions --project ${{ env.FIREBASE_PROJECT }} --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy:
    needs: [build, deploy-firebase]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 300

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Fail if all deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && (steps.deploy2.outcome == 'failure' || steps.deploy2.outcome == 'skipped') && (steps.deploy3.outcome == 'failure' || steps.deploy3.outcome == 'skipped')
        run: |
          echo "::error::GitHub Pages deploy failed after 3 attempts. Re-run this workflow from Actions — transient Pages API errors usually clear within minutes."
          exit 1

      - name: Report deployment URL
        id: deployment
        if: steps.deploy1.outcome == 'success' || steps.deploy2.outcome == 'success' || steps.deploy3.outcome == 'success'
        run: |
          echo "page_url=https://blackturimongao123.github.io/an-average-rpg/" >> "$GITHUB_OUTPUT"

  deploy-retry:
    needs: [build, deploy-firebase, deploy]
    if: failure() && needs.deploy.result == 'failure'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Wait before fresh artifact redeploy
        run: sleep 300

      - name: Download Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: dist

      - name: Re-upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages (fresh artifact)
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: [build, deploy-firebase, deploy, deploy-retry]
    if: always() && needs.deploy-firebase.result == 'success' && (needs.deploy.result == 'success' || needs.deploy-retry.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Verify live site version
        run: |
          EXPECTED="${{ needs.build.outputs.version }}"
          URL="https://blackturimongao123.github.io/an-average-rpg/"
          for attempt in $(seq 1 18); do
            HTML=$(curl -fsSL "$URL?deploy=$attempt" || true)
            if echo "$HTML" | grep -q "app-version\" content=\"$EXPECTED\""; then
              echo "Live site is serving MVP v$EXPECTED"
              echo "Firebase deploy completed in the same workflow run."
              exit 0
            fi
            echo "Live site not on v$EXPECTED yet (attempt $attempt/18)"
            sleep 10
          done
          echo "::warning::Live CDN has not picked up v$EXPECTED yet — try a hard refresh in a few minutes."
